<script>
        function validateform(){
            var x = document.forms['formValid']['name'].value
            var y = document.forms['formValid']['email'].value
            var z = document.forms['formValid']['password'].value
            var a = document.forms['formValid']['repeat-password'].value

            if(x==""||y==""||z==""||a==""){
                alert("Empty Fields!!");

             if(z.length < 8){

                return false;
